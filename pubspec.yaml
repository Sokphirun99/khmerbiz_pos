name: khmerbiz_pos
description: KhmerBiz POS - Point of Sale for Cambodian small businesses
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.6.4
  injectable: ^2.3.2

  # Routing
  go_router: ^13.2.0

  # Network
  dio: ^5.4.0
  retrofit: ^4.2.0
  connectivity_plus: ^5.0.2

  # Local Database
  drift: ^2.15.0
  sqlite3_flutter_libs: ^0.5.18
  path_provider: ^2.1.1
  path: ^1.8.3

  # Secure Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Utilities
  uuid: ^4.2.2
  intl: ^0.20.2

  # Background Sync
  workmanager: ^0.5.2

  # Icons
  cupertino_icons: ^1.0.6

  # UI/UX
  shimmer: ^3.0.0
  google_fonts: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

  # Code Generation
  build_runner: ^2.4.8
  drift_dev: ^2.15.0
  injectable_generator: ^2.4.1
  # retrofit_generator: ^8.0.4  # Temporarily disabled due to SDK compatibility
  json_serializable: ^6.7.1

  # Testing
  mocktail: ^1.0.2
  bloc_test: ^9.1.7

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
