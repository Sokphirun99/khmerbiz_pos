name: khmerbiz_pos
description: KhmerBiz POS - Point of Sale for Cambodian small businesses
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  connectivity_plus: ^5.0.2
  cupertino_icons: ^1.0.6
  dio: ^5.4.0
  drift: ^2.15.0
  equatable: ^2.0.5
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_localizations:
    sdk: flutter
  flutter_secure_storage: ^9.0.0
  get_it: ^7.6.4
  go_router: ^13.2.0
  google_fonts: ^6.1.0
  injectable: ^2.3.2
  intl: ^0.20.2
  path: ^1.8.3
  path_provider: ^2.1.1
  retrofit: ^4.2.0
  shared_preferences: ^2.2.2
  shimmer: ^3.0.0
  sqlite3_flutter_libs: ^0.5.18
  uuid: ^4.2.2
  workmanager: ^0.5.2

dev_dependencies:
  bloc_test: ^9.1.7
  build_runner: ^2.4.8
  drift_dev: ^2.15.0
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter
  injectable_generator: ^2.4.1
  json_serializable: ^6.7.1
  mocktail: ^1.0.2

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
